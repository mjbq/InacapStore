<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InacapStore | Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
        <div class="container">
            
            <a class="navbar-brand d-flex align-items-center fw-bold text-dark text-uppercase" href="index.html">
                <img src="img/logo.png" alt="Logo InacapStore" class="logo-navbar img-fluid">
                <div class="border-start border-secondary border-2 ps-2 ms-2 separador-logo d-flex align-items-center">
                    <span class="text-dark">inacap</span><span class="text-crimson-store">store</span>
                </div>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto gap-2">
                    <a class="nav-link text-dark px-3" href="index.html">Inicio</a>
                    <a class="nav-link text-dark active fw-bold border-bottom border-warning border-2 px-3" href="catalogo.html">Catálogo</a>
                    <a class="nav-link text-dark px-3" href="contacto.html">Contacto</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            
            <section class="col-lg-8 col-md-12 mb-4">
                <h2 class="mb-4 text-dark fw-bold titulo-catalogo">
                    <i class="bi bi-grid-3x3-gap-fill text-danger me-2"></i>Catálogo de Productos
                </h2>
                <div id="contenedor-productos" class="row g-4"></div>
            </section>

            <aside class="col-lg-4 col-md-12">
                <div class="card shadow-sm border-0 sticky-top carrito-sticky">
                    <div class="card-header bg-dark text-white fw-bold py-3 d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-cart4 text-white me-2"></i>Tu Carrito</span>
                        <button class="btn btn-sm btn-warning text-dark fw-bold" onclick="vaciarCarrito()">
                            <i class="bi bi-trash3-fill"></i> Vaciar Carrito
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 text-center">
                                <thead class="table-dark">
                                    <tr class="small text-uppercase text-muted">
                                        <th scope="col" class="text-start ps-3">Producto</th>
                                        <th scope="col">Cant.</th>
                                        <th scope="col">Subtotal</th>
                                        <th scope="col">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="cuerpo-carrito" class="small"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top p-3 d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-dark fs-5">Total:</span>
                        <span class="fs-4 fw-bold text-black">$<span id="total-carrito">0</span></span>
                    </div>
                </div>
            </aside>

        </div>
    </main>

    <footer class="bg-dark text-white-50 text-center py-4 mt-auto border-top border-secondary border-opacity-25">
        <div class="container">
            <p class="mb-1 text-white">&copy; 2026 InacapStore - Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
