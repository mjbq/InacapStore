<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InacapStore | Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold text-dark text-uppercase" href="index.html">
                <img src="img/logo.png" alt="Logo InacapStore" class="logo-navbar img-fluid">
                <div class="border-start border-secondary border-2 ps-2 ms-2 separador-logo d-flex align-items-center">
                    <span class="text-dark">inacap</span><span class="text-crimson-store">store</span>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link text-dark" href="index.html">Inicio</a>
                    <a class="nav-link text-dark" href="catalogo.html">Catálogo</a>
                    <a class="nav-link text-dark" href="contacto.html">Contacto</a>
                </div>
                <div class="ms-lg-3 mt-2 mt-lg-0" id="menu-autenticacion"></div>
            </div>
        </div>
    </nav>

    <main class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                
                <div class="card p-4 shadow border-0">
                    <h2 class="fw-bold h4 mb-4 titulo-catalogo text-dark">Crear una Cuenta</h2>
                    
                    <div id="msg-error-reg" class="alert alert-danger d-none text-center small py-2" role="alert"></div>
                    <div id="msg-exito-reg" class="alert alert-success d-none text-center small py-2" role="alert">
                        ¡Registro exitoso! Redireccionando al Login...
                    </div>

                    <form id="form-registro" novalidate>
                        <div class="mb-3">
                            <label for="nombre" class="form-label text-dark fw-bold">Nombre de usuario</label>
                            <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Tu nombre de usuario" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label text-dark fw-bold">Correo electrónico</label>
                            <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label text-dark fw-bold">Contraseña</label>
                            <input type="password" id="password" name="password" class="form-control" minlength="6" placeholder="Mínimo 6 caracteres" required>
                        </div>

                        <div class="mb-4">
                            <label for="confirm-password" class="form-label text-dark fw-bold">Repetir contraseña</label>
                            <input type="password" id="confirm-password" name="confirm-password" class="form-control" placeholder="Repite tu contraseña" required>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 py-2 fw-bold text-white rounded-3 shadow btn-enviar text-uppercase">
                            Registrarse <i class="bi bi-person-plus ms-2"></i>
                        </button>
                    </form>

                    <p class="text-center mb-0 mt-4 text-muted small">
                        ¿Ya tienes una cuenta? <a href="login.html" class="text-crimson-store fw-bold text-decoration-none">Inicia sesión</a>
                    </p>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-dark text-white-50 text-center py-4 mt-auto border-top border-secondary border-opacity-25">
        <div class="container">
            <p class="mb-1 text-white">&copy; 2026 InacapStore - Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script> 
</body>
</html>
